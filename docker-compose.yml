services:
  webserver:
    image: nginx:alpine
    container_name: practical-webserver
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app

  app:
    build:
      context: .
    container_name: practical-search-app
    restart: unless-stopped
    environment:
      PORT: "3000"
      DB_HOST: database
      DB_PORT: "3306"
      DB_NAME: testdb
      DB_USER: admin
      DB_PASSWORD: "2400749@SIT.singaporetech.edu.sg"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0
    container_name: practical-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "2400749@SIT.singaporetech.edu.sg"
      MYSQL_DATABASE: testdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: "2400749@SIT.singaporetech.edu.sg"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - "-p2400749@SIT.singaporetech.edu.sg"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  gitserver:
    image: docker.gitea.com/gitea:latest
    container_name: practical-git-server
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__DOMAIN: 127.0.0.1
      GITEA__server__ROOT_URL: http://127.0.0.1:3000/
      GITEA__server__SSH_DOMAIN: 127.0.0.1
      GITEA__server__SSH_PORT: "2222"
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data

  sonarqube:
    image: sonarqube:community
    container_name: practical-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonardatabase:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: "2400749@SIT.singaporetech.edu.sg"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonardatabase:
        condition: service_healthy

  sonardatabase:
    image: postgres:16-alpine
    container_name: practical-sonarqube-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: "2400749@SIT.singaporetech.edu.sg"
    volumes:
      - sonarqube_database:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sonar -d sonarqube
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  sonarqube-init:
    image: curlimages/curl:latest
    container_name: practical-sonarqube-init
    restart: "no"
    environment:
      SONAR_ADMIN_PASSWORD: "2400749@SIT.singaporetech.edu.sg"
    depends_on:
      - sonarqube
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        until curl --fail --silent http://sonarqube:9000/api/system/status |
          grep -q '"status":"UP"'; do
          sleep 5
        done

        if curl --fail --silent \
          --user "admin:$${SONAR_ADMIN_PASSWORD}" \
          http://sonarqube:9000/api/authentication/validate |
          grep -q '"valid":true'; then
          echo "SonarQube administrator password is already configured."
          exit 0
        fi

        curl --fail --silent --show-error \
          --user admin:admin \
          --request POST \
          --data-urlencode "login=admin" \
          --data-urlencode "previousPassword=admin" \
          --data-urlencode "password=$${SONAR_ADMIN_PASSWORD}" \
          http://sonarqube:9000/api/users/change_password
        echo "SonarQube administrator password configured."

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles:
      - tools
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: "${SONAR_TOKEN:-}"
    volumes:
      - .:/usr/src
    depends_on:
      - sonarqube

  certgen:
    image: alpine:latest
    profiles:
      - tools
    volumes:
      - ./certs:/certs
    command:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssl &&
        openssl req -x509 -nodes -newkey rsa:2048 -sha256 -days 365 \
          -keyout /certs/server.key \
          -out /certs/server.crt \
          -config /certs/openssl.cnf \
          -extensions v3_req

volumes:
  mysql_data:
    name: practicaltest_mysql_data
  gitea_data:
    name: practicaltest_gitea_data
  sonarqube_data:
    name: practicaltest_sonarqube_data
  sonarqube_extensions:
    name: practicaltest_sonarqube_extensions
  sonarqube_logs:
    name: practicaltest_sonarqube_logs
  sonarqube_database:
    name: practicaltest_sonarqube_database
