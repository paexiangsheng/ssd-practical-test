<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Secure Search</title>
  </head>
  <body>
    <main>
      <h1>Secure Search</h1>
      <p id="validationMessage" role="alert"></p>
      <form id="searchForm" action="/search" method="post" novalidate>
        <label for="searchTerm">Search term</label>
        <input
          id="searchTerm"
          name="searchTerm"
          type="text"
          required
          minlength="2"
          maxlength="80"
          autocomplete="off"
        >
        <button type="submit">Search</button>
      </form>
    </main>
    <script src="/validation.js"></script>
  </body>
</html>
